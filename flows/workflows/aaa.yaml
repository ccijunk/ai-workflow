version: "1"

nodes:
  fetch_issue:
    role: fetcher
    prompt: prompts/fetch-issue.md
    executor: opencode
    inputs: {issue_url: issue-url.txt}
    outputs: {requirement: requirement.md}

  create_pr:
    role: pr-creator
    prompt: prompts/create-pr-simple.md
    executor: opencode
    inputs: {requirement: requirement.md}
    outputs: {pr_url: pr-url.txt}

transitions:
  - from: __start__
    to: fetch_issue

  - from: fetch_issue
    to: create_pr

  - from: create_pr
    to: __end__