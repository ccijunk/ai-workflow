version: "1"

nodes:
  fetch:
    role: fetcher
    prompt: prompts/fetch-issue.md
    executor: opencode
    inputs: {issue_url: issue-url.txt}
    outputs: {requirement: requirement.md}

  create_branch:
    role: pr-creator
    prompt: prompts/create-branch-issue.md
    executor: opencode
    inputs: {requirement: requirement.md, repo_root: repo-root.txt}
    outputs: {branch_name: branch-name.txt}

  modify:
    role: developer
    prompt: prompts/modify-code.md
    executor: opencode
    inputs: {requirement: requirement.md, repo_root: repo-root.txt, branch_name: branch-name.txt}
    outputs: {changes: changes.md}

  create_pr:
    role: pr-creator
    prompt: prompts/create-pr-issue.md
    executor: opencode
    inputs: {requirement: requirement.md, branch_name: branch-name.txt, repo_root: repo-root.txt, changes: changes.md}
    outputs: {pr_url: pr-url.txt}

transitions:
  - from: __start__
    to: fetch

  - from: fetch
    to: create_branch

  - from: create_branch
    to: modify

  - from: modify
    to: create_pr

  - from: create_pr
    to: __end__