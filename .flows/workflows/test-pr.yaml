version: "1"

nodes:
  fetch_issue:
    role: fetcher
    prompt: prompts/fetch-issue.md
    executor: opencode
    inputs: {issue_url: issue-url.txt}
    outputs: {requirement: requirement.md}

  implement:
    role: developer
    prompt: prompts/implement-test.md
    executor: opencode
    inputs: {requirement: requirement.md}
    outputs: {code: test-output.txt}

  create_pr:
    role: pr-creator
    prompt: prompts/create-pr-test.md
    executor: opencode
    inputs: {requirement: requirement.md, code: test-output.txt, repo_root: repo-root.txt}
    outputs: {pr_url: pr-url.txt}

transitions:
  - from: __start__
    to: fetch_issue

  - from: fetch_issue
    to: implement

  - from: implement
    to: create_pr

  - from: create_pr
    to: __end__