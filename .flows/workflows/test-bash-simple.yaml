version: "1"

nodes:
  fetch_issue:
    role: github
    executor: bash
    command: scripts/fetch-issue.sh
    inputs: {issue_url: issue-url.txt}
    outputs: {requirement: requirement.md, repo_root: repo-root.txt}

transitions:
  - from: __start__
    to: fetch_issue

  - from: fetch_issue
    to: __end__