version: "1"

nodes:
  create_branch:
    role: pr-creator
    prompt: prompts/create-branch.md
    executor: opencode
    inputs: {repo_root: repo-root.txt}
    outputs: {branch_name: branch-name.txt}

  create_pr:
    role: pr-creator
    prompt: prompts/create-pr-direct.md
    executor: opencode
    inputs: {branch_name: branch-name.txt, repo_root: repo-root.txt}
    outputs: {pr_url: pr-url.txt}

transitions:
  - from: __start__
    to: create_branch

  - from: create_branch
    to: create_pr

  - from: create_pr
    to: __end__