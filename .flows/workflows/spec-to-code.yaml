version: "1"

nodes:
  fetch_issue:
    role: fetcher
    prompt: prompts/fetch-issue.md
    executor: opencode
    inputs: {issue_url: issue-url.txt}
    outputs: {requirement: requirement.md}

  create_branch:
    role: pr-creator
    prompt: prompts/create-branch-issue.md
    executor: opencode
    inputs: {requirement: requirement.md, repo_root: repo-root.txt}
    outputs: {branch_name: branch-name.txt}

  clarify:
    role: ba
    prompt: prompts/clarity.md
    executor: opencode
    inputs: {requirement: requirement.md}
    outputs: {clarify_md: clarify.md}

  human_confirm_clarify:
    role: human
    prompt: prompts/human-confirm-clarify.md
    executor: opencode
    inputs: {clarify: clarify.md}
    outputs: {clarify_approved: clarify-approved.txt}

  design:
    role: architect
    prompt: prompts/design.md
    executor: opencode
    inputs: {clarify: clarify.md, architecture: ARCHITECTURE.md}
    outputs: {design_md: docs/design.md}

  test_design:
    role: test-arch
    prompt: prompts/test-design.md
    executor: opencode
    inputs: {design: docs/design.md, architecture: ARCHITECTURE.md}
    outputs: {test_design_md: docs/test-design.md}

  human_confirm_design:
    role: human
    prompt: prompts/human-confirm-design.md
    executor: opencode
    inputs: {design: docs/design.md, test_design: docs/test-design.md}
    outputs: {design_approved: design-approved.txt}

  explore:
    role: developer
    prompt: prompts/explore.md
    executor: opencode
    inputs: {design: docs/design.md}
    outputs: {explore_md: explore.md}

  coding:
    role: developer
    prompt: prompts/coding.md
    executor: opencode
    inputs: {explore: explore.md, test_design: docs/test-design.md}
    outputs: {implementation_md: implementation.md}

  modify:
    role: developer
    prompt: prompts/modify-code.md
    executor: opencode
    inputs: {requirement: requirement.md, repo_root: repo-root.txt, branch_name: branch-name.txt, implementation: implementation.md}
    outputs: {changes: changes.md}

  testing:
    role: tester
    prompt: prompts/testing.md
    executor: opencode
    inputs: {implementation: implementation.md}
    outputs: {test_report: test-report.md, pass: pass.txt}

  fix_test:
    role: developer
    prompt: prompts/fix-test.md
    executor: opencode
    inputs: {test_report: test-report.md}
    outputs: {fix_md: fix.md}

  review:
    role: reviewer
    prompt: prompts/review.md
    executor: opencode
    inputs: {implementation: implementation.md, test_report: test-report.md}
    outputs: {review_md: review.md, verdict: verdict.txt}

  fix_review:
    role: developer
    prompt: prompts/fix-review.md
    executor: opencode
    inputs: {review: review.md}
    outputs: {fix_review_md: fix-review.md}

  reflect:
    role: meta
    prompt: prompts/reflect.md
    executor: opencode
    inputs: {}
    outputs: {pending_diff: pending.diff}

  create_pr:
    role: pr-creator
    prompt: prompts/create-pr-issue.md
    executor: opencode
    inputs: {requirement: requirement.md, branch_name: branch-name.txt, repo_root: repo-root.txt, implementation: implementation.md, review: review.md}
    outputs: {pr_url: pr-url.txt}

transitions:
  - from: __start__
    to: fetch_issue

  - from: fetch_issue
    to: create_branch

  - from: create_branch
    to: clarify

  - from: clarify
    to: human_confirm_clarify

  - from: human_confirm_clarify
    to: design
    when: clarify_approved == "yes"

  - from: human_confirm_clarify
    to: clarify
    when: clarify_approved == "no"

  - from: design
    to: test_design

  - from: test_design
    to: human_confirm_design

  - from: human_confirm_design
    to: explore
    when: design_approved == "yes"

  - from: human_confirm_design
    to: clarify
    when: design_approved == "no"

  - from: explore
    to: coding

  - from: coding
    to: modify

  - from: modify
    to: testing

  - from: testing
    to: review
    when: pass == "yes"

  - from: testing
    to: fix_test
    when: pass == "no"

  - from: fix_test
    to: modify

  - from: review
    to: reflect
    when: verdict == "PASS"

  - from: review
    to: fix_review
    when: verdict == "FAIL"

  - from: fix_review
    to: modify

  - from: reflect
    to: create_pr

  - from: create_pr
    to: __end__